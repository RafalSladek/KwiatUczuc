<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kONtakt — Włącz się na siebie</title>
<meta property="og:title" content="kONtakt — Włącz się na siebie">
<meta property="og:description" content="Emocje, potrzeby, wewnętrzne spełnienie. Wieczorny rytuał emocjonalny dla rodzin.">
<meta property="og:image" content="https://kontakt.rafal-sladek.com/icons/icon-512.png">
<meta property="og:url" content="https://kontakt.rafal-sladek.com/">
<meta property="og:type" content="website">
<meta name="description" content="kONtakt — wieczorny rytuał emocjonalny dla rodzin. Rozpoznawaj i nazywaj swoje stany emocjonalne.">
<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #1a1a2e 100%);
    min-height: 100vh;
    width: 100%;
    color: #e0e0f0;
    overflow-x: hidden;
  }

  .bg-orb {
    position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.3; z-index: 0;
    animation: float 20s ease-in-out infinite;
  }
  .bg-orb:nth-child(1) { width: 400px; height: 400px; background: #e040fb; top: -100px; left: -100px; }
  .bg-orb:nth-child(2) { width: 300px; height: 300px; background: #536dfe; bottom: -50px; right: -50px; animation-delay: -5s; }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -30px) scale(1.05); }
    66% { transform: translate(-20px, 20px) scale(0.95); }
  }

  .app {
    position: relative; z-index: 1;
    width: 100%;
    min-height: 100vh;
    overflow: hidden;
  }

  .screen {
    position: absolute;
    inset: 0;
    padding: 40px 24px 24px;
    display: flex;
    flex-direction: column;
    transition: opacity 0.4s ease, transform 0.4s ease;
    overflow: hidden;
  }

  .screen.hidden {
    opacity: 0;
    transform: translateX(100%);
    pointer-events: none;
  }

  .screen.hidden-left {
    opacity: 0;
    transform: translateX(-100%);
    pointer-events: none;
  }

  .app-header { text-align: center; margin-bottom: 8px; }

  .app-title {
    font-size: 2rem; font-weight: 300; letter-spacing: 0.08em;
    background: linear-gradient(135deg, #e040fb, #536dfe, #00bfa5);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  .app-subtitle { font-size: 0.9rem; color: #6666aa; margin-top: 4px; }

  .screen-question {
    text-align: center; color: #9999bb; font-size: 1.1rem; margin: 20px 0 16px;
  }

  .emotion-circle {
    position: relative;
    margin: 0 auto;
  }

  .emotion-circle { transition: width 0.9s ease, height 0.9s ease; }

  .emo {
    position: absolute;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    cursor: pointer;
    transition: left 0.9s ease, top 0.9s ease, width 0.9s ease, height 0.9s ease,
                transform 0.9s ease, font-size 0.9s ease, opacity 0.5s ease;
    border: 2px solid transparent;
    font-weight: 500;
    user-select: none;
    overflow-wrap: break-word;
    word-break: break-word;
    hyphens: auto;
    padding: 4px;
    line-height: 1.15;
    transform: translate(-50%, -50%);
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    animation: breathe 3s ease-in-out infinite;
    animation-delay: var(--breathe-delay, 0s);
  }
  .petal-text {
    transition: transform 0.9s ease;
  }

  @keyframes breathe {
    0%, 100% { box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    50% { box-shadow: 0 6px 25px rgba(0,0,0,0.3); }
  }

  .emo:hover { transform: translate(-50%, -50%) scale(1.1); }
  .emo:active { transform: translate(-50%, -50%) scale(0.95); }

  .emo.selected {
    border-color: rgba(255,255,255,0.6);
    box-shadow: 0 0 25px rgba(255,255,255,0.2);
    transform: translate(-50%, -50%) scale(1.08);
    animation: none;
  }

  body.pastel .emo { box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
  body.pastel .emo.selected {
    border-color: rgba(0,0,0,0.2);
    box-shadow: 0 0 25px rgba(0,0,0,0.12);
  }

  .layout-toggle {
    text-align: center; margin-top: 12px; cursor: pointer; padding: 6px;
    -webkit-tap-highlight-color: transparent;
    outline: none;
    user-select: none;
  }
  .layout-toggle svg { width: 28px; height: 28px; opacity: 0.5; transition: opacity 0.3s; vertical-align: middle; }
  .layout-toggle:hover svg { opacity: 0.8; }
  body.pastel .layout-toggle svg { opacity: 0.6; }

  .add-btn {
    position: fixed; top: 16px; left: 16px; z-index: 60;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
    color: #aaa; border-radius: 20px; padding: 8px 16px;
    font-size: 0.85rem; cursor: pointer; font-family: inherit;
    transition: all 0.3s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .add-btn:hover { background: rgba(255,255,255,0.18); }

  .confirm-btn {
    display: block; margin: 12px auto 0; padding: 12px 40px;
    background: linear-gradient(135deg, rgba(186,104,200,0.5), rgba(100,181,246,0.5));
    border: 1px solid rgba(255,255,255,0.15); border-radius: 24px;
    color: #fff; font-size: 1rem; font-weight: 500; font-family: inherit;
    cursor: pointer; transition: all 0.3s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .confirm-btn:hover { transform: scale(1.05); }
  .confirm-btn.hidden { display: none; }
  body.pastel .confirm-btn {
    background: linear-gradient(135deg, rgba(195,177,225,0.7), rgba(167,199,249,0.7));
    border-color: rgba(0,0,0,0.1); color: #4a3070;
  }

  .period-selector {
    display: flex; margin: 0 auto 12px; border-radius: 24px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
    max-width: 360px; width: 100%;
  }
  .period-btn {
    flex: 1; padding: 10px 4px; border: none; background: transparent;
    color: rgba(255,255,255,0.4); font-size: 0.8rem; font-family: inherit;
    font-weight: 500; cursor: pointer; transition: all 0.3s ease;
    -webkit-tap-highlight-color: transparent;
    border-right: 1px solid rgba(255,255,255,0.08);
  }
  .period-btn:last-child { border-right: none; }
  .period-btn.active {
    background: rgba(255,255,255,0.12); color: #e0e0f0; font-weight: 600;
  }
  .period-btn:hover { background: rgba(255,255,255,0.08); }
  body.pastel .period-selector {
    border-color: rgba(0,0,0,0.1); background: rgba(0,0,0,0.03);
  }
  body.pastel .period-btn {
    color: rgba(0,0,0,0.3); border-right-color: rgba(0,0,0,0.06);
  }
  body.pastel .period-btn.active {
    background: rgba(0,0,0,0.06); color: #3d3d5c;
  }
  body.pastel .period-btn:hover { background: rgba(0,0,0,0.04); }

  .pie-svg {
    width: 90vw; max-width: 560px; height: auto;
    margin: 10px auto 0; display: block; flex: 1;
    filter: drop-shadow(0 4px 20px rgba(0,0,0,0.3));
  }

  .pie-svg text {
    font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
    font-weight: 500; text-anchor: middle; dominant-baseline: central;
  }

  .back-btn {
    position: fixed; top: 16px; left: 16px; z-index: 60;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
    color: #aaa; border-radius: 20px; padding: 8px 16px;
    font-size: 0.85rem; cursor: pointer; font-family: inherit;
    transition: all 0.3s ease;
  }
  .back-btn:hover { background: rgba(255,255,255,0.18); }

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(22,33,62,0.82);
    backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .modal-overlay.active { opacity: 1; pointer-events: all; }

  .modal {
    background: rgba(15,52,96,0.92);
    border: 1px solid rgba(186,104,200,0.2);
    border-radius: 24px;
    padding: 28px 24px; width: 280px; text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .modal h3 { font-size: 1rem; font-weight: 400; color: #d1c4e9; margin-bottom: 16px; }

  .modal input {
    width: 100%;
    background: rgba(149,117,205,0.1);
    border: 1px solid rgba(149,117,205,0.2);
    border-radius: 16px;
    padding: 12px 16px; color: #e0e0f0; font-size: 0.9rem;
    outline: none; font-family: inherit; margin-bottom: 16px;
  }

  .modal input::placeholder { color: rgba(209,196,233,0.4); }
  .modal input:focus { border-color: rgba(186,104,200,0.5); }

  .modal-actions { display: flex; gap: 10px; }
  .modal-actions button {
    flex: 1; padding: 10px; border-radius: 16px; border: none;
    font-size: 0.85rem; cursor: pointer; font-family: inherit;
  }
  .modal-cancel { background: rgba(149,117,205,0.12); color: #b39ddb; }
  .modal-save { background: linear-gradient(135deg, rgba(239,83,80,0.6), rgba(186,104,200,0.6)); color: #fff; }

  .theme-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 60;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
    color: #aaa; border-radius: 20px; padding: 8px 16px;
    font-size: 0.85rem; cursor: pointer; font-family: inherit;
    transition: all 0.3s ease;
  }
  .theme-toggle:hover { background: rgba(255,255,255,0.18); }

  /* === Pastel theme === */
  body.pastel {
    background: linear-gradient(135deg, #fef9f3 0%, #fdf2e9 30%, #f5e6d8 60%, #fef9f3 100%);
    color: #3d3d5c;
  }
  body.pastel .bg-orb:nth-child(1) { background: #f8b4d9; opacity: 0.25; }
  body.pastel .bg-orb:nth-child(2) { background: #a7c7f9; opacity: 0.25; }
  body.pastel .app-title {
    background: linear-gradient(135deg, #e8729a, #7b8cde, #5cbfb0);
    -webkit-background-clip: text; background-clip: text;
  }
  body.pastel .app-subtitle { color: #9a8fad; }
  body.pastel .screen-question { color: #7a7a9a; }
  body.pastel .add-btn {
    background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); color: #7a6fa0;
  }
  body.pastel .add-btn:hover { background: rgba(0,0,0,0.1); }
  body.pastel .pie-period { color: #9a8fad; }
  body.pastel .back-btn {
    background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.1); color: #7a7a9a;
  }
  body.pastel .back-btn:hover { background: rgba(0,0,0,0.1); }
  body.pastel .emo.selected {
    border-color: rgba(0,0,0,0.25);
    box-shadow: 0 0 20px rgba(0,0,0,0.08);
  }
  body.pastel .theme-toggle {
    background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.1); color: #7a7a9a;
  }
  body.pastel .theme-toggle:hover { background: rgba(0,0,0,0.1); }
  body.pastel .modal-overlay { background: rgba(253,242,233,0.88); }
  body.pastel .modal {
    background: rgba(255,255,255,0.97);
    border-color: rgba(161,48,96,0.15);
    box-shadow: 0 8px 32px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.8);
  }
  body.pastel .modal h3 { color: #6a3080; }
  body.pastel .modal input {
    background: rgba(195,177,225,0.12); border-color: rgba(195,177,225,0.3); color: #3d3d5c;
  }
  body.pastel .modal input::placeholder { color: rgba(106,48,128,0.3); }
  body.pastel .modal input:focus { border-color: rgba(161,48,96,0.4); }
  body.pastel .modal-cancel { background: rgba(195,177,225,0.15); color: #6a3080; }
  body.pastel .modal-save { background: linear-gradient(135deg, rgba(248,180,200,0.8), rgba(195,177,225,0.8)); color: #4a3070; }
  body.pastel .pie-svg { filter: drop-shadow(0 4px 20px rgba(0,0,0,0.08)); }
</style>
</head>
<body>

<div class="bg-orb"></div>
<div class="bg-orb"></div>
<button class="add-btn" onclick="showModal()">+ emocje</button>
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">ciemny</button>

<div class="app">

  <div class="screen" id="screen1">
    <div class="app-header">
      <div class="app-title">kONtakt</div>
      <div class="app-subtitle">Włącz się na siebie</div>
    </div>
    <p class="screen-question">Jak się dziś czujesz?</p>
    <div class="emotion-circle" id="emotionCircle"></div>
    <div class="layout-toggle" id="layoutToggle" onclick="toggleLayout()"></div>
    <button class="confirm-btn hidden" id="confirmBtn" onclick="confirmSelection()">Gotowe</button>
  </div>

  <div class="screen hidden" id="screen2">
    <div class="app-header">
      <div class="app-title">kONtakt</div>
      <div class="app-subtitle">Włącz się na siebie</div>
    </div>
    <div class="period-selector" id="periodSelector">
      <button class="period-btn active" data-period="today" onclick="setPeriod('today')">dziś</button>
      <button class="period-btn" data-period="week" onclick="setPeriod('week')">tydzień</button>
      <button class="period-btn" data-period="2weeks" onclick="setPeriod('2weeks')">2 tyg</button>
      <button class="period-btn" data-period="4weeks" onclick="setPeriod('4weeks')">4 tyg</button>
    </div>
    <svg class="pie-svg" id="pieSvg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg"></svg>
    <button class="back-btn" onclick="goBack()">wstecz</button>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3>Dodaj własny stan</h3>
      <input type="text" id="customInput" placeholder="np. zmęczenie, ekscytacja..." maxlength="20"
             onkeydown="if(event.key==='Enter')addCustom()">
      <div class="modal-actions">
        <button class="modal-cancel" onclick="hideModal()">Anuluj</button>
        <button class="modal-save" onclick="addCustom()">Dodaj</button>
      </div>
    </div>
  </div>

</div> <!-- /app -->

<script>
  var customEmotions = JSON.parse(localStorage.getItem('panigosia_custom') || '[]');
  var entries = JSON.parse(localStorage.getItem('panigosia_entries') || '[]');

  /* Colors based on original Feelings Wheel (Dr. Gloria Willcox)
     Happy=#F0D860  Sad=#6B9DC8  Disgusted=#7AB48C  Angry=#E88878
     Fearful=#A8C878  Bad=#8BA0C0  Surprised=#C8A0D0 */
  var darkColors = {
    emotions: [
      { name: 'radość', bg: 'rgba(240,216,96,0.28)', color: '#f5e8a0' },
      { name: 'smutek', bg: 'rgba(107,157,200,0.28)', color: '#a8cce8' },
      { name: 'wstręt', bg: 'rgba(122,180,140,0.28)', color: '#a8d8b8' },
      { name: 'złość', bg: 'rgba(232,136,120,0.28)', color: '#f0b8a8' },
      { name: 'strach', bg: 'rgba(168,200,120,0.28)', color: '#c8e0a0' },
      { name: 'dyskomfort', bg: 'rgba(139,160,192,0.28)', color: '#b8c8e0' },
      { name: 'zaskoczenie', bg: 'rgba(200,160,208,0.28)', color: '#d8c0e0' }
    ],
    custom: [
      { bg: 'rgba(220,190,120,0.28)', color: '#e8d8a0' },
      { bg: 'rgba(120,180,180,0.28)', color: '#a0d0d0' },
      { bg: 'rgba(210,150,140,0.28)', color: '#e0b8b0' },
      { bg: 'rgba(150,200,140,0.28)', color: '#b8d8a8' }
    ]
  };

  var pastelColors = {
    emotions: [
      { name: 'radość', bg: 'rgba(240,216,96,0.45)', color: '#8a7820' },
      { name: 'smutek', bg: 'rgba(107,157,200,0.45)', color: '#2a5580' },
      { name: 'wstręt', bg: 'rgba(122,180,140,0.45)', color: '#2a6040' },
      { name: 'złość', bg: 'rgba(232,136,120,0.45)', color: '#903028' },
      { name: 'strach', bg: 'rgba(168,200,120,0.45)', color: '#4a6020' },
      { name: 'dyskomfort', bg: 'rgba(139,160,192,0.45)', color: '#3a4870' },
      { name: 'zaskoczenie', bg: 'rgba(200,160,208,0.45)', color: '#5a3068' }
    ],
    custom: [
      { bg: 'rgba(220,190,120,0.45)', color: '#786020' },
      { bg: 'rgba(120,180,180,0.45)', color: '#1a5858' },
      { bg: 'rgba(210,150,140,0.45)', color: '#703020' },
      { bg: 'rgba(150,200,140,0.45)', color: '#2a5820' }
    ]
  };

  var currentTheme = localStorage.getItem('panigosia_theme') || 'pastel';
  var baseEmotions = darkColors.emotions;
  var customColors = darkColors.custom;
  var colorMap = {};

  function applyTheme() {
    var palette = currentTheme === 'pastel' ? pastelColors : darkColors;
    baseEmotions = palette.emotions;
    customColors = palette.custom;
    colorMap = {};
    baseEmotions.forEach(function(e) { colorMap[e.name] = { bg: e.bg, color: e.color }; });
    if (currentTheme === 'pastel') {
      document.body.classList.add('pastel');
    } else {
      document.body.classList.remove('pastel');
    }
    document.getElementById('themeToggle').textContent = currentTheme === 'dark' ? 'pastel' : 'ciemny';
  }

  function toggleTheme() {
    currentTheme = currentTheme === 'dark' ? 'pastel' : 'dark';
    localStorage.setItem('panigosia_theme', currentTheme);
    applyTheme();
    renderWheel();
  }

  applyTheme();

  var currentLayout = localStorage.getItem('panigosia_layout') || 'circle';
  var emoElements = [];
  var currentEmotions = [];

  var miniFlowerSvg = '<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">'
    + '<ellipse cx="20" cy="11" rx="5" ry="8" fill="rgba(240,216,96,0.6)" stroke="rgba(138,120,32,0.4)" stroke-width="0.5" transform="rotate(0,20,20)"/>'
    + '<ellipse cx="20" cy="11" rx="5" ry="8" fill="rgba(107,157,200,0.6)" stroke="rgba(42,85,128,0.4)" stroke-width="0.5" transform="rotate(51.4,20,20)"/>'
    + '<ellipse cx="20" cy="11" rx="5" ry="8" fill="rgba(122,180,140,0.6)" stroke="rgba(42,96,64,0.4)" stroke-width="0.5" transform="rotate(102.8,20,20)"/>'
    + '<ellipse cx="20" cy="11" rx="5" ry="8" fill="rgba(232,136,120,0.6)" stroke="rgba(144,48,40,0.4)" stroke-width="0.5" transform="rotate(154.3,20,20)"/>'
    + '<ellipse cx="20" cy="11" rx="5" ry="8" fill="rgba(168,200,120,0.6)" stroke="rgba(74,96,32,0.4)" stroke-width="0.5" transform="rotate(205.7,20,20)"/>'
    + '<ellipse cx="20" cy="11" rx="5" ry="8" fill="rgba(139,160,192,0.6)" stroke="rgba(58,72,112,0.4)" stroke-width="0.5" transform="rotate(257.1,20,20)"/>'
    + '<ellipse cx="20" cy="11" rx="5" ry="8" fill="rgba(200,160,208,0.6)" stroke="rgba(90,48,104,0.4)" stroke-width="0.5" transform="rotate(308.6,20,20)"/>'
    + '</svg>';

  var miniCircleSvg = '<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">'
    + '<circle cx="20" cy="8" r="4.5" fill="rgba(240,216,96,0.6)" stroke="rgba(138,120,32,0.4)" stroke-width="0.5"/>'
    + '<circle cx="28.5" cy="12.5" r="4.5" fill="rgba(107,157,200,0.6)" stroke="rgba(42,85,128,0.4)" stroke-width="0.5"/>'
    + '<circle cx="30" cy="22" r="4.5" fill="rgba(122,180,140,0.6)" stroke="rgba(42,96,64,0.4)" stroke-width="0.5"/>'
    + '<circle cx="24" cy="30" r="4.5" fill="rgba(232,136,120,0.6)" stroke="rgba(144,48,40,0.4)" stroke-width="0.5"/>'
    + '<circle cx="16" cy="30" r="4.5" fill="rgba(168,200,120,0.6)" stroke="rgba(74,96,32,0.4)" stroke-width="0.5"/>'
    + '<circle cx="10" cy="22" r="4.5" fill="rgba(139,160,192,0.6)" stroke="rgba(58,72,112,0.4)" stroke-width="0.5"/>'
    + '<circle cx="11.5" cy="12.5" r="4.5" fill="rgba(200,160,208,0.6)" stroke="rgba(90,48,104,0.4)" stroke-width="0.5"/>'
    + '</svg>';

  function updateToggleIcon() {
    var toggle = document.getElementById('layoutToggle');
    if (toggle) toggle.innerHTML = currentLayout === 'circle' ? miniFlowerSvg : miniCircleSvg;
  }

  function toggleLayout() {
    currentLayout = currentLayout === 'circle' ? 'flower' : 'circle';
    localStorage.setItem('panigosia_layout', currentLayout);
    updateToggleIcon();
    applyPositions();
  }

  function computeCircleLayout(count) {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight * 0.55;
    var maxDim = Math.min(maxW, maxH);
    var gap = 10;
    var sinVal = Math.sin(Math.PI / count);
    var emoSize = Math.round(78 * Math.min(1, 7 / count));
    emoSize = Math.max(44, emoSize);
    var rMin = (emoSize + gap) / (2 * sinVal);
    var rMax = (maxDim - emoSize) / 2 - 4;
    if (rMin > rMax) {
      emoSize = Math.round((2 * sinVal * (rMax + 4) * 2 + 2 * sinVal * (-gap)) / (1 + 2 * sinVal));
      emoSize = Math.max(40, Math.min(emoSize, 78));
      rMin = (emoSize + gap) / (2 * sinVal);
    }
    var radius = Math.min(rMin, rMax);
    return { emoSize: emoSize, radius: radius, fontSize: Math.max(0.65, 0.85 * emoSize / 78) };
  }

  function getContainerSize(count) {
    var cl = computeCircleLayout(count);
    return (cl.radius + cl.emoSize / 2 + 4) * 2;
  }

  function applyPositions() {
    var container = document.getElementById('emotionCircle');
    var count = emoElements.length;
    if (count === 0) return;
    var size = getContainerSize(count);
    container.style.width = size + 'px';
    container.style.height = size + 'px';
    var cx = size / 2;
    var cy = size / 2;

    if (currentLayout === 'flower') {
      var cl = computeCircleLayout(count);
      var outerR = cl.radius;
      var gap = 6;
      var innerR = outerR * 0.18;
      var petalLen = outerR - innerR;
      var midR = (outerR + innerR) / 2;
      var arcW = 2 * outerR * Math.sin(Math.PI / count) - gap;
      arcW = Math.max(36, Math.min(arcW, petalLen * 0.6));
      var fontSize = Math.max(0.6, 0.78 * arcW / 60);

      emoElements.forEach(function(el, i) {
        var angle = (2 * Math.PI * i / count) - Math.PI / 2;
        var x = cx + midR * Math.cos(angle);
        var y = cy + midR * Math.sin(angle);
        el.style.width = arcW + 'px';
        el.style.height = Math.round(petalLen) + 'px';
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.fontSize = fontSize + 'rem';
        var deg = angle * 180 / Math.PI + 90;
        el.style.transform = 'translate(-50%, -50%) rotate(' + deg + 'deg)';
        var span = el.querySelector('.petal-text');
        if (span) span.style.transform = 'rotate(' + (-deg) + 'deg)';
      });
    } else {
      var layout = computeCircleLayout(count);
      var emoSize = layout.emoSize;
      var radius = layout.radius;
      var fontSize = layout.fontSize;

      emoElements.forEach(function(el, i) {
        var angle = (2 * Math.PI * i / count) - Math.PI / 2;
        var x = cx + radius * Math.cos(angle);
        var y = cy + radius * Math.sin(angle);
        el.style.width = emoSize + 'px';
        el.style.height = emoSize + 'px';
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.fontSize = fontSize + 'rem';
        el.style.transform = 'translate(-50%, -50%) rotate(0deg)';
        var span = el.querySelector('.petal-text');
        if (span) span.style.transform = 'rotate(0deg)';
      });
    }
  }

  function renderWheel() {
    var container = document.getElementById('emotionCircle');
    while (container.firstChild) container.removeChild(container.firstChild);
    emoElements = [];

    var shuffled = baseEmotions.slice();
    for (var s = shuffled.length - 1; s > 0; s--) {
      var j = Math.floor(Math.random() * (s + 1));
      var tmp = shuffled[s]; shuffled[s] = shuffled[j]; shuffled[j] = tmp;
    }
    currentEmotions = shuffled;
    customEmotions.forEach(function(name, i) {
      var ci = i % customColors.length;
      colorMap[name] = customColors[ci];
      currentEmotions.push({ name: name, bg: customColors[ci].bg, color: customColors[ci].color });
    });

    currentEmotions.forEach(function(emo, i) {
      var el = document.createElement('div');
      el.className = 'emo';
      el.dataset.name = emo.name;
      var span = document.createElement('span');
      span.className = 'petal-text';
      span.textContent = emo.name;
      el.appendChild(span);
      el.style.background = emo.bg;
      el.style.color = emo.color;
      el.style.setProperty('--breathe-delay', (i * 0.5) + 's');
      el.onclick = function() { selectEmo(el); };
      container.appendChild(el);
      emoElements.push(el);
    });

    applyPositions();
    updateToggleIcon();
  }

  function today() {
    return new Date().toISOString().split('T')[0];
  }

  var selectedNames = [];
  var currentPeriod = 'today';

  function selectEmo(el) {
    var name = el.dataset.name;
    var idx = selectedNames.indexOf(name);
    if (idx === -1) {
      el.classList.add('selected');
      selectedNames.push(name);
    } else {
      el.classList.remove('selected');
      selectedNames.splice(idx, 1);
    }
    document.getElementById('confirmBtn').classList.toggle('hidden', selectedNames.length === 0);
  }

  function confirmSelection() {
    if (selectedNames.length === 0) return;
    var entry = { date: today(), emotions: selectedNames.slice() };
    entries.push(entry);
    localStorage.setItem('panigosia_entries', JSON.stringify(entries));
    localStorage.setItem('panigosia_last_vote', today());
    currentPeriod = 'today';
    updatePeriodButtons();
    renderPie(true);
    document.getElementById('screen1').classList.add('hidden-left');
    document.getElementById('screen2').classList.remove('hidden');
    document.querySelector('.add-btn').style.display = 'none';
  }

  function goBack() {
    selectedNames = [];
    document.querySelectorAll('.emo.selected').forEach(function(el) { el.classList.remove('selected'); });
    document.getElementById('confirmBtn').classList.add('hidden');
    document.getElementById('screen2').classList.add('hidden');
    document.getElementById('screen1').classList.remove('hidden-left');
    document.querySelector('.add-btn').style.display = '';
  }

  // Swipe left on screen1 to confirm
  (function() {
    var s1 = document.getElementById('screen1');
    var startX = 0;
    s1.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; }, { passive: true });
    s1.addEventListener('touchend', function(e) {
      var dx = e.changedTouches[0].clientX - startX;
      if (dx < -60 && selectedNames.length > 0) confirmSelection();
    }, { passive: true });
  })();

  function setPeriod(p) {
    currentPeriod = p;
    updatePeriodButtons();
    renderPie(true);
  }

  function updatePeriodButtons() {
    document.querySelectorAll('.period-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.period === currentPeriod);
    });
  }

  function showModal() {
    document.getElementById('modal').classList.add('active');
    setTimeout(function() { document.getElementById('customInput').focus(); }, 100);
  }

  function hideModal() {
    document.getElementById('modal').classList.remove('active');
    document.getElementById('customInput').value = '';
  }

  function addCustom() {
    var input = document.getElementById('customInput');
    var name = input.value.trim().toLowerCase();
    if (!name || colorMap[name] || customEmotions.indexOf(name) !== -1) { hideModal(); return; }
    customEmotions.push(name);
    localStorage.setItem('panigosia_custom', JSON.stringify(customEmotions));
    hideModal();

    var ci = (customEmotions.length - 1) % customColors.length;
    colorMap[name] = customColors[ci];
    var emo = { name: name, bg: customColors[ci].bg, color: customColors[ci].color };
    currentEmotions.push(emo);

    var container = document.getElementById('emotionCircle');
    var el = document.createElement('div');
    el.className = 'emo';
    el.dataset.name = emo.name;
    var span = document.createElement('span');
    span.className = 'petal-text';
    span.textContent = emo.name;
    el.appendChild(span);
    el.style.background = emo.bg;
    el.style.color = emo.color;
    el.style.setProperty('--breathe-delay', (emoElements.length * 0.5) + 's');
    el.style.opacity = '0';
    el.style.left = (container.offsetWidth / 2) + 'px';
    el.style.top = (container.offsetHeight / 2) + 'px';
    el.style.width = '0px';
    el.style.height = '0px';
    el.onclick = function() { selectEmo(el); };
    container.appendChild(el);
    emoElements.push(el);

    requestAnimationFrame(function() {
      el.style.opacity = '1';
      applyPositions();
    });
  }

  function getFilteredEntries() {
    var now = new Date();
    var cutoff = new Date(now);
    if (currentPeriod === 'today') cutoff.setHours(0, 0, 0, 0);
    else if (currentPeriod === 'week') cutoff.setDate(now.getDate() - 7);
    else if (currentPeriod === '2weeks') cutoff.setDate(now.getDate() - 14);
    else if (currentPeriod === '4weeks') cutoff.setDate(now.getDate() - 28);
    var cutoffStr = cutoff.toISOString().split('T')[0];
    return entries.filter(function(e) { return e.date >= cutoffStr; });
  }

  function renderPie(animate) {
    var svg = document.getElementById('pieSvg');
    while (svg.firstChild) svg.removeChild(svg.firstChild);

    var filtered = getFilteredEntries();
    var counts = {};
    var total = 0;
    for (var i = 0; i < filtered.length; i++) {
      var emos = filtered[i].emotions;
      for (var j = 0; j < emos.length; j++) {
        var n = emos[j];
        counts[n] = (counts[n] || 0) + 1;
        total++;
      }
    }
    if (total === 0) return;

    var sorted = Object.keys(counts).map(function(k) { return [k, counts[k]]; });
    sorted.sort(function(a, b) { return b[1] - a[1]; });

    var cx = 150, cy = 150, r = 125;
    var ns = 'http://www.w3.org/2000/svg';

    // Single emotion — full circle
    if (sorted.length === 1) {
      var name = sorted[0][0];
      var c = colorMap[name] || { bg: 'rgba(200,200,200,0.3)', color: '#ccc' };
      var pieBg = c.bg.replace(/,\s*[\d.]+\)$/, currentTheme === 'dark' ? ',0.55)' : ',0.7)');
      var circle = document.createElementNS(ns, 'circle');
      circle.setAttribute('cx', cx);
      circle.setAttribute('cy', cy);
      circle.setAttribute('r', animate ? '0' : String(r));
      circle.setAttribute('fill', pieBg);
      if (animate) {
        var anim = document.createElementNS(ns, 'animate');
        anim.setAttribute('attributeName', 'r');
        anim.setAttribute('from', '0');
        anim.setAttribute('to', String(r));
        anim.setAttribute('dur', '0.6s');
        anim.setAttribute('fill', 'freeze');
        anim.setAttribute('calcMode', 'spline');
        anim.setAttribute('keySplines', '0.4 0 0.2 1');
        circle.appendChild(anim);
      }
      svg.appendChild(circle);
      var text = document.createElementNS(ns, 'text');
      text.setAttribute('x', cx);
      text.setAttribute('y', cy);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dominant-baseline', 'central');
      text.setAttribute('font-size', '20');
      text.setAttribute('font-weight', '600');
      text.setAttribute('fill', currentTheme === 'dark' ? '#ffffff' : c.color);
      text.setAttribute('opacity', animate ? '0' : '1');
      text.textContent = name;
      svg.appendChild(text);
      if (animate) setTimeout(function() { text.setAttribute('opacity', '1'); }, 500);
      return;
    }

    // Multi-segment spiral animation: segments appear one by one sweeping in
    var startAngle = -90;
    var segDelay = animate ? 120 : 0;
    var segDur = animate ? 0.4 : 0;

    for (var i = 0; i < sorted.length; i++) {
      (function(idx) {
        var name = sorted[idx][0];
        var count = sorted[idx][1];
        var sweep = (count / total) * 360;
        var endAngle = startAngle + sweep;
        var c = colorMap[name] || { bg: 'rgba(200,200,200,0.3)', color: '#ccc' };
        var pieBg = c.bg.replace(/,\s*[\d.]+\)$/, currentTheme === 'dark' ? ',0.55)' : ',0.7)');
        var sA = startAngle;

        function drawSegment() {
          var startRad = (sA * Math.PI) / 180;
          var endRad = (endAngle * Math.PI) / 180;
          var x1 = cx + r * Math.cos(startRad);
          var y1 = cy + r * Math.sin(startRad);
          var x2 = cx + r * Math.cos(endRad);
          var y2 = cy + r * Math.sin(endRad);
          var largeArc = sweep > 180 ? 1 : 0;

          var path = document.createElementNS(ns, 'path');
          path.setAttribute('d', 'M' + cx + ',' + cy + ' L' + x1 + ',' + y1 + ' A' + r + ',' + r + ' 0 ' + largeArc + ',1 ' + x2 + ',' + y2 + ' Z');
          path.setAttribute('fill', pieBg);
          if (animate) {
            path.style.opacity = '0';
            path.style.transition = 'opacity ' + segDur + 's ease';
          }
          svg.appendChild(path);

          var line = document.createElementNS(ns, 'line');
          line.setAttribute('x1', cx); line.setAttribute('y1', cy);
          line.setAttribute('x2', x1); line.setAttribute('y2', y1);
          line.setAttribute('stroke', 'rgba(255,255,255,0.08)');
          line.setAttribute('stroke-width', '0.5');
          if (animate) { line.style.opacity = '0'; line.style.transition = 'opacity ' + segDur + 's ease'; }
          svg.appendChild(line);

          var midDeg = sA + sweep / 2;
          var midRad = (midDeg * Math.PI) / 180;
          var lr = r * 0.6;
          var lx = cx + lr * Math.cos(midRad);
          var ly = cy + lr * Math.sin(midRad);

          // Radial text orientation (like feelings wheel)
          // Text runs along the radius; flip if pointing downward so it stays readable
          var textDeg = midDeg;
          if (textDeg > 90 && textDeg < 270) textDeg += 180;
          if (textDeg < -90 && textDeg > -270) textDeg += 180;
          // Normalize negative angles from startAngle=-90
          var normDeg = ((midDeg % 360) + 360) % 360;
          textDeg = normDeg;
          if (normDeg > 90 && normDeg < 270) textDeg = normDeg + 180;

          var text = document.createElementNS(ns, 'text');
          text.setAttribute('x', lx); text.setAttribute('y', ly);
          text.setAttribute('font-size', sweep > 30 ? '14' : '10');
          text.setAttribute('font-weight', '600');
          text.setAttribute('fill', currentTheme === 'dark' ? '#ffffff' : c.color);
          text.setAttribute('text-anchor', 'middle');
          text.setAttribute('dominant-baseline', 'central');
          text.setAttribute('transform', 'rotate(' + textDeg + ',' + lx + ',' + ly + ')');
          text.textContent = name;
          if (animate) { text.style.opacity = '0'; text.style.transition = 'opacity 0.3s ease'; }
          svg.appendChild(text);

          if (animate) {
            requestAnimationFrame(function() {
              path.style.opacity = '1';
              line.style.opacity = '1';
              setTimeout(function() { text.style.opacity = '1'; }, segDur * 600);
            });
          }
        }

        if (animate) {
          setTimeout(drawSegment, idx * segDelay);
        } else {
          drawSegment();
        }

        startAngle = endAngle;
      })(i);
    }
  }

  renderWheel();

  if (localStorage.getItem('panigosia_last_vote') === today()) {
    currentPeriod = 'today';
    updatePeriodButtons();
    renderPie(false);
    document.getElementById('screen1').classList.add('hidden-left');
    document.getElementById('screen2').classList.remove('hidden');
    document.querySelector('.add-btn').style.display = 'none';
  }
</script>

</body>
